<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060504" />
    <!-- Brand favicon (official Landmark Developers badge: blue peak + mountain).
         Google Search + older browsers index the raster /favicon.ico, which
         lives at the site root, so it is listed first. PNGs cover high-DPI and
         home-screen / apple-touch cases. -->
    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Critical inline styles: paint the dark background and reserve the app
         height BEFORE the JS/CSS bundle loads, so there is no white flash or
         layout jump on first paint (index.css only applies once the module
         graph has parsed). -->
    <style>
      html, body { margin: 0; background: #060504; color: #f6f1e9; }
      #root { min-height: 100svh; }
    </style>
    <title>Landmark Developers — Premium Living in Bahria Town Lahore</title>
    <meta
      name="description"
      content="Invest in premium residential & commercial spaces by Landmark Developers in Bahria Town Lahore. 9+ years, 500+ units delivered, guaranteed on-time delivery. Grand 15, Grand 14 & Grand X now selling."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://landmarkdevelopers.landmarkdevelopers.com.pk/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Landmark Developers — Premium Living in Bahria Town Lahore" />
    <meta
      property="og:description"
      content="Premium residential & commercial investment in Bahria Town Lahore. Trusted for on-time delivery and high-return opportunities."
    />
    <meta property="og:image" content="https://landmarkdevelopers.landmarkdevelopers.com.pk/wp-content/uploads/2025/11/Landmark-Website-Logo-scaled.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://landmarkdevelopers.landmarkdevelopers.com.pk" crossorigin />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Landmark Developers",
        "url": "https://landmarkdevelopers.landmarkdevelopers.com.pk/",
        "telephone": "+92 321 000 4000",
        "areaServed": "Bahria Town, Lahore",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Plaza no. 39 AA Commercial, Main Boulevard, Bahria Town",
          "addressLocality": "Lahore",
          "addressCountry": "PK"
        },
        "openingHours": "Mo-Sa 10:00-20:00"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
